<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Outreach · Evotix</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --accent:  #38BDF8;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }

.hub-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
.dash-title {
  margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--text-tertiary);
  text-decoration: none; transition: color 0.15s;
}
.back-link:hover { color: var(--text-primary); }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
}

.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.gm-input {
  flex: 1; min-width: 140px;
  padding: 11px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; background: rgba(0,0,0,0.28);
  color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
.gm-status { font-size: 11.5px; color: var(--text-tertiary); min-height: 16px; margin-top: 8px; }

.company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 20px 0; }

.company-card {
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 14px; cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
}
.company-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
.company-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.company-name { font-size: 14.5px; font-weight: 700; color: var(--text-primary); }
.company-del {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 16px; cursor: pointer; padding: 0 2px; opacity: 0.5; flex-shrink: 0;
  transition: opacity 0.15s, color 0.15s;
}
.company-del:hover { opacity: 1; color: var(--danger); }
.company-summary {
  font-size: 12px; color: var(--text-tertiary); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.company-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.milestone-pill {
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  padding: 3px 8px; border-radius: 999px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); color: var(--text-tertiary);
}
.milestone-pill.done { background: rgba(107,227,164,0.12); border-color: rgba(107,227,164,0.32); color: var(--success); }
.win-notes-preview { font-size: 11.5px; color: var(--text-tertiary); font-style: italic; }

/* ===== Profile modal ===== */
.modal-bg {
  position: fixed; inset: 0; z-index: 130; display: none;
  align-items: flex-start; justify-content: center; padding: 24px 16px;
  overflow-y: auto;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 640px;
  background: #0e0e10; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
  margin-bottom: 24px;
}
.modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.modal-title { font-size: 19px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.modal-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }
.modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.modal-close:hover { color: var(--text-primary); }

.profile-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.07); }
.profile-eyebrow {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.research-summary { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; }
.research-list { margin: 8px 0 0; padding-left: 18px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.news-item { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
.news-headline { color: var(--text-primary); font-weight: 600; }
.research-sources { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
.research-sources a { font-size: 10.5px; color: var(--text-tertiary); text-decoration: none; }
.research-sources a:hover { color: var(--accent); }

.research-empty { font-size: 12.5px; color: var(--text-tertiary); font-style: italic; }
.mini-btn {
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-primary); font-family: inherit; font-size: 11px; font-weight: 700;
  padding: 6px 11px; border-radius: 9px; cursor: pointer; white-space: nowrap;
  transition: background 0.15s;
}
.mini-btn:hover { background: rgba(255,255,255,0.08); }
.mini-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.milestone-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border-radius: 11px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 8px; cursor: pointer; user-select: none;
}
.milestone-row input { accent-color: var(--accent); width: 17px; height: 17px; cursor: pointer; flex-shrink: 0; }
.milestone-row .ml-label { font-size: 13.5px; color: var(--text-primary); font-weight: 600; flex: 1; }
.milestone-row .ml-hint { font-size: 10.5px; color: var(--text-tertiary); }

.win-notes-textarea {
  width: 100%; min-height: 80px; resize: vertical;
  padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 13px; line-height: 1.5; outline: none;
}
.win-notes-textarea::placeholder { color: var(--text-tertiary); }

.framework-textarea {
  width: 100%; min-height: 70px; resize: vertical;
  padding: 10px 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-secondary);
  font-family: inherit; font-size: 12px; line-height: 1.5; outline: none;
  margin-bottom: 10px;
}
.framework-textarea::placeholder { color: var(--text-tertiary); }

.generated-box {
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 13px; margin-top: 10px;
}
.generated-subject { font-size: 12.5px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.generated-body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; }
.generated-foot { display: flex; justify-content: flex-end; margin-top: 10px; }

.history-toggle { font-size: 11px; color: var(--text-tertiary); cursor: pointer; margin-top: 10px; text-decoration: underline; }
.history-list { display: none; margin-top: 8px; }
.history-list.show { display: block; }
.history-item { padding: 9px 11px; background: rgba(255,255,255,0.03); border-radius: 9px; margin-bottom: 6px; font-size: 11.5px; color: var(--text-tertiary); }
.history-item-body { color: var(--text-secondary); margin-top: 4px; white-space: pre-wrap; }

/* ===== Contacts + touchpoints ===== */
.contact-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.contact-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.contact-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
.contact-title { font-size: 11.5px; color: var(--text-tertiary); margin-top: 1px; }
.contact-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px; }
.contact-meta a, .contact-meta span { font-size: 11px; color: var(--text-tertiary); text-decoration: none; }
.contact-meta a:hover { color: var(--accent); }
.contact-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 16px; cursor: pointer; opacity: 0.5; flex-shrink: 0; transition: opacity 0.15s, color 0.15s; }
.contact-del:hover { opacity: 1; color: var(--danger); }
.touchpoint-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
.touchpoint-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-secondary); background: rgba(255,255,255,0.025); border-radius: 8px; padding: 6px 9px; }
.touchpoint-date { font-family: var(--font-mono); color: var(--text-tertiary); flex-shrink: 0; }
.touchpoint-type { font-weight: 700; color: var(--text-primary); flex-shrink: 0; }
.touchpoint-note { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.touchpoint-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 13px; cursor: pointer; opacity: 0.5; flex-shrink: 0; }
.touchpoint-del:hover { opacity: 1; color: var(--danger); }
.touchpoint-add-row { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
.touchpoint-add-row select, .touchpoint-add-row input {
  padding: 7px 9px; font-size: 11.5px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.28);
  color: var(--text-primary); font-family: inherit; outline: none;
}
.touchpoint-add-row select { flex: 0 0 92px; }
.touchpoint-add-row input[type="date"] { flex: 0 0 122px; color-scheme: dark; }
.touchpoint-add-row input[type="text"] { flex: 1; min-width: 100px; }
.contact-add-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.contact-add-row input { flex: 1 1 130px; }
.contacts-empty { font-size: 12.5px; color: var(--text-tertiary); font-style: italic; margin-bottom: 4px; }
.mini-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.framework-block { margin-bottom: 16px; }
.draft-buttons-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.draft-buttons-row .mini-btn { flex: 1; text-align: center; }
.call-panel { margin-top: 10px; }
.call-notes-textarea {
  width: 100%; min-height: 66px; resize: vertical;
  padding: 9px 11px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 12px; line-height: 1.5; outline: none; margin-bottom: 8px;
}
.call-notes-textarea::placeholder { color: var(--text-tertiary); }
.contact-generated { margin-top: 10px; }
.contact-generated .generated-box { margin-top: 6px; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .modal { padding: 18px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="hub-head">
    <div>
      <a class="back-link" href="evotix.html">← Evotix</a>
      <h1 class="dash-title" style="margin-top:4px">Outreach</h1>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Add Company</div>
    <div class="gm-card">
      <div class="gm-input-wrap">
        <input class="gm-input" id="cName" type="text" placeholder="Company name…" autocomplete="off" style="flex:1 1 200px">
        <input class="gm-input" id="cContext" type="text" placeholder="Context (optional) — industry, how you found them…" autocomplete="off" style="flex:2 1 260px">
        <button class="gm-add" id="cAdd" type="button">🔍 Research &amp; Add</button>
      </div>
      <div class="gm-status" id="cStatus"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Active Pipeline</div>
    <div class="company-grid" id="activeGrid"></div>
  </div>

  <div class="section">
    <div class="section-title">Passed Opportunities</div>
    <div class="company-grid" id="passedGrid"></div>
  </div>

</div><!-- /.page -->

<!-- ===== Company profile modal ===== -->
<div class="modal-bg" id="profileBg">
  <div class="modal" id="profileModal" role="dialog" aria-label="Company profile"></div>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  const STORE_KEY = 'evotix:companies';
  const FRAMEWORK_EMAIL_KEY = 'evotix:outreach:emailFramework';
  const FRAMEWORK_LINKEDIN_KEY = 'evotix:outreach:linkedinFramework';

  function loadJSON(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
    catch (e) { return fallback; }
  }
  function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
  function loadStr(key) { return localStorage.getItem(key) || ''; }
  function saveStr(key, value) { localStorage.setItem(key, value); }

  function load() { return loadJSON(STORE_KEY, []); }
  function save(items) { saveJSON(STORE_KEY, items); }
  function newId() { return 'co' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function findById(items, id) { return items.findIndex((c) => c.id === id); }
  function updateCompany(id, mutator) {
    const items = load();
    const i = findById(items, id);
    if (i < 0) return;
    mutator(items[i]);
    save(items);
    renderLists();
    if (openId === id) renderModal(id);
  }
  function deleteCompany(id) {
    if (!confirm('Delete this company profile? This cannot be undone.')) return;
    const items = load();
    const i = findById(items, id);
    if (i < 0) return;
    items.splice(i, 1);
    save(items);
    if (openId === id) closeModal();
    renderLists();
  }

  function fmtDate(ts) {
    return ts ? new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
  }

  /* ---------- goals integration (mirrors main.html's goal-day logic) ---------- */
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function getActiveDateString() {
    const now = new Date();
    if (now.getHours() < 6) {
      const d = new Date(now);
      d.setDate(d.getDate() - 1);
      return dateToKey(d);
    }
    return dateToKey(now);
  }
  function pushGoalDone(text) {
    const key = 'goals:' + getActiveDateString();
    const goals = loadJSON(key, []);
    goals.push({ text: text, done: true, doneAt: Date.now() });
    saveJSON(key, goals);
    window.dispatchEvent(new CustomEvent('goals-changed'));
  }
  function pushSao(companyName) {
    const saos = loadJSON('evotix:saos', []);
    saos.push({ date: dateToKey(new Date()), note: 'Opportunity passed — ' + companyName });
    saveJSON('evotix:saos', saos);
  }

  /* ---------- research + content API calls ---------- */
  function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

  // How much the model needs to search varies per company, so these calls
  // sometimes finish fine and sometimes hit the platform's timeout — that's
  // a transient failure, not a broken request, so retry a couple of times
  // before giving up rather than making the search budget more conservative
  // (which would just trade "sometimes 504s" for "reliably finds less").
  async function callApi(path, body, retries) {
    if (retries == null) retries = 2;
    for (let attempt = 0; attempt <= retries; attempt++) {
      let res;
      try {
        res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch (e) {
        if (attempt < retries) { await sleep(500 * (attempt + 1)); continue; }
        throw e;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const transient = res.status === 504 || res.status === 502 || res.status === 503;
        if (transient && attempt < retries) { await sleep(500 * (attempt + 1)); continue; }
        throw new Error((data && data.error) || ('request failed (' + res.status + ')'));
      }
      return data;
    }
  }

  /* ---------- research — company info only ---------- */
  // The "suggested contacts" research feature (AI web-search + ZoomInfo
  // hunting for names) was pulled out — it was regularly 504ing and dragging
  // down company research's reliability along with it. Manually-added
  // contacts + touchpoints below are unaffected; this only removed the
  // auto-suggestion step.
  async function runResearch(name, context) {
    const research = { summary: '', useCases: [], recentNews: [], sources: [], researchedAt: Date.now() };
    const errors = [];
    try {
      const data = await callApi('/api/company-research', { name: name, context: context });
      research.summary = data.summary || '';
      research.useCases = Array.isArray(data.useCases) ? data.useCases : [];
      research.recentNews = Array.isArray(data.recentNews) ? data.recentNews : [];
      research.sources = Array.isArray(data.sources) ? data.sources : [];
    } catch (e) {
      errors.push('company research — ' + (e && e.message ? e.message : 'failed'));
    }
    return { research, errors };
  }

  /* ---------- add company ---------- */
  async function addCompany() {
    const nameEl = $('cName');
    const ctxEl = $('cContext');
    const statusEl = $('cStatus');
    const addBtn = $('cAdd');
    const name = nameEl.value.trim();
    if (!name) return;

    addBtn.disabled = true;
    statusEl.textContent = 'Researching ' + name + '…';

    const company = {
      id: newId(),
      name: name,
      context: ctxEl.value.trim(),
      research: null,
      meetingBooked: false,
      meetingBookedAt: null,
      passed: false,
      passedAt: null,
      winNotes: '',
      notes: '',
      emails: [],
      linkedin: [],
      createdAt: Date.now()
    };

    const { research, errors } = await runResearch(name, company.context);
    company.research = research;
    statusEl.textContent = errors.length ? ('Added — some research didn\'t finish: ' + errors.join('; ') + '. Try Re-research in the profile.') : '';
    if (errors.length) setTimeout(() => { statusEl.textContent = ''; }, 8000);

    const items = load();
    items.push(company);
    save(items);
    nameEl.value = '';

  /* ---------- contacts + touchpoints ---------- */
  function addContact(id, name, title, email, linkedin) {
    if (!name.trim()) return;
    if (!title.trim()) { alert('Job title is required — it\'s what personalizes emails and LinkedIn messages to this contact.'); return; }
    updateCompany(id, (c) => {
      c.contacts = c.contacts || [];
      c.contacts.push({ id: newId(), name: name.trim(), title: title.trim(), email: email.trim(), linkedin: linkedin.trim(), notes: '', touchpoints: [], callScripts: [] });
    });
  }
  function deleteContact(id, contactId) {
    if (!confirm('Delete this contact and its touchpoints?')) return;
    updateCompany(id, (c) => {
      c.contacts = (c.contacts || []).filter((ct) => ct.id !== contactId);
    });
  }
  function addTouchpoint(id, contactId, date, type, note) {
    updateCompany(id, (c) => {
      const contact = (c.contacts || []).find((ct) => ct.id === contactId);
      if (!contact) return;
      contact.touchpoints = contact.touchpoints || [];
      contact.touchpoints.push({ id: newId(), date: date, type: type, note: note.trim() });
      contact.touchpoints.sort((a, b) => a.date.localeCompare(b.date));
    });
  }
  function deleteTouchpoint(id, contactId, tpId) {
    updateCompany(id, (c) => {
      const contact = (c.contacts || []).find((ct) => ct.id === contactId);
      if (!contact) return;
      contact.touchpoints = (contact.touchpoints || []).filter((t) => t.id !== tpId);
    });
  }
  function logCallNote(id, contactId, note) {
    if (!note.trim()) return;
    addTouchpoint(id, contactId, new Date().toISOString().slice(0, 10), 'Call', note);
  }

  /* ---------- email / linkedin generation — scoped to one contact ---------- */
  // touchCount is the contact's touchpoint count *before* this generation, so
  // the server can stage the message (cold open -> follow-up -> break-up)
  // instead of writing the same pitch every time. A touchpoint is only logged
  // when the rep marks a draft "Sent" (see markContactMessageSent) — generating
  // a draft on its own does NOT count as a touch, so regenerating a different
  // take on the initial email/LinkedIn (e.g. a different news angle) before
  // picking one to send won't get mistaken for a follow-up.
  async function generateContactEmail(id, contactId, btnEl) {
    const items = load();
    const c = items[findById(items, id)];
    const contact = c && (c.contacts || []).find((ct) => ct.id === contactId);
    if (!contact) return;
    const framework = loadStr(FRAMEWORK_EMAIL_KEY);
    const origLabel = btnEl.textContent;
    btnEl.disabled = true;
    btnEl.textContent = 'Writing…';
    try {
      const data = await callApi('/api/outreach-content', {
        type: 'email',
        company: { name: c.name, summary: c.research && c.research.summary, useCases: c.research && c.research.useCases, recentNews: c.research && c.research.recentNews, notes: c.notes },
        contact: { name: contact.name, title: contact.title, notes: contact.notes },
        framework: framework,
        touchCount: (contact.touchpoints || []).length,
        priorMessages: (contact.emails || []).slice(-4).map((e) => ({ subject: e.subject, body: e.body }))
      });
      updateCompany(id, (co) => {
        const ct = (co.contacts || []).find((x) => x.id === contactId);
        if (!ct) return;
        ct.emails = ct.emails || [];
        ct.emails.push({ subject: data.subject || '', body: data.body || '', generatedAt: Date.now(), sent: false });
      });
    } catch (e) {
      alert('Couldn\'t generate email: ' + (e && e.message ? e.message : 'try again.'));
    } finally {
      btnEl.disabled = false;
      btnEl.textContent = origLabel;
    }
  }
  async function generateContactLinkedin(id, contactId, btnEl) {
    const items = load();
    const c = items[findById(items, id)];
    const contact = c && (c.contacts || []).find((ct) => ct.id === contactId);
    if (!contact) return;
    const framework = loadStr(FRAMEWORK_LINKEDIN_KEY);
    const origLabel = btnEl.textContent;
    btnEl.disabled = true;
    btnEl.textContent = 'Writing…';
    try {
      const data = await callApi('/api/outreach-content', {
        type: 'linkedin',
        company: { name: c.name, summary: c.research && c.research.summary, useCases: c.research && c.research.useCases, recentNews: c.research && c.research.recentNews, notes: c.notes },
        contact: { name: contact.name, title: contact.title, notes: contact.notes },
        framework: framework,
        touchCount: (contact.touchpoints || []).length,
        priorMessages: (contact.linkedin || []).slice(-4).map((m) => ({ body: m.body }))
      });
      updateCompany(id, (co) => {
        const ct = (co.contacts || []).find((x) => x.id === contactId);
        if (!ct) return;
        ct.linkedin = ct.linkedin || [];
        ct.linkedin.push({ body: data.body || '', generatedAt: Date.now(), sent: false });
      });
    } catch (e) {
      alert('Couldn\'t generate LinkedIn message: ' + (e && e.message ? e.message : 'try again.'));
    } finally {
      btnEl.disabled = false;
      btnEl.textContent = origLabel;
    }
  }

  // Marks one specific drafted email/LinkedIn message as the version actually
  // sent — this is the ONLY thing that logs a touchpoint for it, which is what
  // advances touchCount (and therefore the cold-open -> follow-up staging) and
  // what shows up in the contact's Activity log.
  function markContactMessageSent(id, contactId, listKey, generatedAt, touchType, touchNote) {
    updateCompany(id, (co) => {
      const ct = (co.contacts || []).find((x) => x.id === contactId);
      if (!ct) return;
      const list = ct[listKey] || [];
      const item = list.find((m) => m.generatedAt === generatedAt);
      if (item) item.sent = true;
      ct.touchpoints = ct.touchpoints || [];
      ct.touchpoints.push({ id: newId(), date: new Date().toISOString().slice(0, 10), type: touchType, note: touchNote });
      ct.touchpoints.sort((a, b) => a.date.localeCompare(b.date));
    });
  }

  // Call scripts are prep material, not a sent touch — the actual call still
  // gets logged separately via the "Log Call" panel, so generation here does
  // not push a touchpoint (unlike drafting an email/LinkedIn message).
  async function generateContactCallScript(id, contactId, btnEl, variant) {
    const items = load();
    const c = items[findById(items, id)];
    const contact = c && (c.contacts || []).find((ct) => ct.id === contactId);
    if (!contact) return;
    const origLabel = btnEl.textContent;
    btnEl.disabled = true;
    btnEl.textContent = 'Writing…';
    try {
      const data = await callApi('/api/outreach-content', {
        type: 'callscript',
        company: { name: c.name, summary: c.research && c.research.summary, useCases: c.research && c.research.useCases, recentNews: c.research && c.research.recentNews, notes: c.notes },
        contact: { name: contact.name, title: contact.title, notes: contact.notes },
        touchCount: (contact.touchpoints || []).length,
        priorMessages: (contact.callScripts || []).slice(-4).map((cs) => ({ body: 'Opener: ' + (cs.opener || '') + (cs.close ? (' | Close: ' + cs.close) : '') })),
        variantRequest: !!variant
      });
      updateCompany(id, (co) => {
        const ct = (co.contacts || []).find((x) => x.id === contactId);
        if (!ct) return;
        ct.callScripts = ct.callScripts || [];
        ct.callScripts.push({
          opener: data.opener || '',
          questions: Array.isArray(data.questions) ? data.questions : [],
          close: data.close || '',
          generatedAt: Date.now()
        });
      });
    } catch (e) {
      alert('Couldn\'t generate call script: ' + (e && e.message ? e.message : 'try again.'));
    } finally {
      btnEl.disabled = false;
      btnEl.textContent = origLabel;
    }
  }

  function formatCallScript(cs) {
    const parts = ['OPENER:\n' + (cs.opener || '')];
    (cs.questions || []).forEach((group) => {
      parts.push(group.category + ':\n' + (group.items || []).map((q) => '- ' + q).join('\n'));
    });
    parts.push('MEETING CLOSE:\n' + (cs.close || ''));
    return parts.join('\n\n');
  }

  function copyText(text, btnEl) {
    const orig = btnEl.textContent;
    navigator.clipboard.writeText(text).then(() => {
      btnEl.textContent = 'Copied ✓';
      setTimeout(() => { btnEl.textContent = orig; }, 1500);
    }).catch(() => {});
  }

  /* ---------- card builder ---------- */
  function buildCard(c) {
    const el = document.createElement('div');

    const top = document.createElement('div');

    name.className = 'company-name';
    name.textContent = c.name;
    const del = document.createElement('button');

    const summary = document.createElement('div');

  function renderLists() {
    const items = load();
    const active = items.filter((c) => !c.passed).sort((a, b) => b.createdAt - a.createdAt);
    const passed = items.filter((c) => c.passed).sort((a, b) => (b.passedAt || 0) - (a.passedAt || 0));

    const activeGrid = $('activeGrid');
    activeGrid.innerHTML = '';
    if (active.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No companies in the pipeline yet — add one above.';
      activeGrid.appendChild(empty);
    } else {
      active.forEach((c) => activeGrid.appendChild(buildCard(c)));
    }

    const passedGrid = $('passedGrid');
    passedGrid.innerHTML = '';
    if (passed.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'Nothing passed yet.';
      passedGrid.appendChild(empty);
    } else {
      passed.forEach((c) => passedGrid.appendChild(buildCard(c)));
    }
  }

  /* ---------- profile modal ---------- */
  let openId = null;
  const openCallPanels = new Set(); // UI-only state: which contacts' call-note panels are expanded
  const dismissedDrafts = new Set(); // UI-only state: which generated drafts the user closed (key: contactId:type:generatedAt)

  function openModal(id) {
    openId = id;

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && openId) closeModal(); });

  function renderModal(id) {
    const items = load();

    const modal = $('profileModal');

      draftEmailBtn.type = 'button';
      draftEmailBtn.textContent = '✍️ Draft Email';
      draftEmailBtn.addEventListener('click', () => generateContactEmail(id, contact.id, draftEmailBtn));
      const draftLiBtn = document.createElement('button');
      draftLiBtn.className = 'mini-btn';
      draftLiBtn.type = 'button';
      draftLiBtn.textContent = '💬 Draft LinkedIn';
      draftLiBtn.addEventListener('click', () => generateContactLinkedin(id, contact.id, draftLiBtn));
      const draftCallBtn = document.createElement('button');
      draftCallBtn.className = 'mini-btn';
      draftCallBtn.type = 'button';
      draftCallBtn.textContent = '📞 Draft Call Script';
      draftCallBtn.addEventListener('click', () => generateContactCallScript(id, contact.id, draftCallBtn));
      draftRow.append(draftEmailBtn, draftLiBtn, draftCallBtn);
      card.appendChild(draftRow);

      const genWrap = document.createElement('div');
      genWrap.className = 'contact-generated';
      const emails = contact.emails || [];
      if (emails.length) {
        const latest = emails[emails.length - 1];
        const emailKey = contact.id + ':email:' + latest.generatedAt;
        if (!dismissedDrafts.has(emailKey)) {
          const box = document.createElement('div');
          box.className = 'generated-box';
          const subj = document.createElement('div');
          subj.className = 'generated-subject';
          subj.textContent = latest.subject;
          const body = document.createElement('div');
          body.className = 'generated-body';
          body.textContent = latest.body;
          const foot = document.createElement('div');
          foot.className = 'generated-foot';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'mini-btn';
          copyBtn.type = 'button';
          copyBtn.textContent = '📋 Copy Email';
          copyBtn.addEventListener('click', () => copyText(latest.subject + '\n\n' + latest.body, copyBtn));
          const sentBtn = document.createElement('button');
          sentBtn.className = 'mini-btn';
          sentBtn.type = 'button';
          if (latest.sent) {
            sentBtn.textContent = '✓ Sent';
            sentBtn.disabled = true;
          } else {
            sentBtn.textContent = '✓ Mark as Sent';
            sentBtn.addEventListener('click', () => {
              markContactMessageSent(id, contact.id, 'emails', latest.generatedAt, 'Email', 'Sent: ' + (latest.subject || ''));
              dismissedDrafts.add(emailKey);
              renderModal(id);
            });
          }
          const closeBtn = document.createElement('button');
          closeBtn.className = 'mini-btn';
          closeBtn.type = 'button';
          closeBtn.textContent = '✕ Close';
          closeBtn.addEventListener('click', () => {
            dismissedDrafts.add(emailKey);
            renderModal(id);
          });
          foot.append(copyBtn, sentBtn, closeBtn);
          box.append(subj, body, foot);
          genWrap.appendChild(box);
        }
        if (emails.length > 1) {
          genWrap.appendChild(buildHistoryToggle(emails.slice(0, -1).reverse(), (e) => e.subject + '\n' + e.body));
        }
      }
      const linkedinMsgs = contact.linkedin || [];
      if (linkedinMsgs.length) {
        const latest = linkedinMsgs[linkedinMsgs.length - 1];
        const liKey = contact.id + ':linkedin:' + latest.generatedAt;
        if (!dismissedDrafts.has(liKey)) {
          const box = document.createElement('div');
          box.className = 'generated-box';
          const body = document.createElement('div');
          body.className = 'generated-body';
          body.textContent = latest.body;
          const foot = document.createElement('div');
          foot.className = 'generated-foot';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'mini-btn';
          copyBtn.type = 'button';
          copyBtn.textContent = '📋 Copy LinkedIn';
          copyBtn.addEventListener('click', () => copyText(latest.body, copyBtn));
          const sentBtn = document.createElement('button');
          sentBtn.className = 'mini-btn';
          sentBtn.type = 'button';
          if (latest.sent) {
            sentBtn.textContent = '✓ Sent';
            sentBtn.disabled = true;
          } else {
            sentBtn.textContent = '✓ Mark as Sent';
            sentBtn.addEventListener('click', () => {
              markContactMessageSent(id, contact.id, 'linkedin', latest.generatedAt, 'LinkedIn', 'Sent a LinkedIn message');
              dismissedDrafts.add(liKey);
              renderModal(id);
            });
          }
          const closeBtn = document.createElement('button');
          closeBtn.className = 'mini-btn';
          closeBtn.type = 'button';
          closeBtn.textContent = '✕ Close';
          closeBtn.addEventListener('click', () => {
            dismissedDrafts.add(liKey);
            renderModal(id);
          });
          foot.append(copyBtn, sentBtn, closeBtn);
          box.append(body, foot);
          genWrap.appendChild(box);
        }
        if (linkedinMsgs.length > 1) {
          genWrap.appendChild(buildHistoryToggle(linkedinMsgs.slice(0, -1).reverse(), (m) => m.body));
        }
      }
      const callScripts = contact.callScripts || [];
      if (callScripts.length) {
        const latest = callScripts[callScripts.length - 1];
        const csKey = contact.id + ':callscript:' + latest.generatedAt;
        if (!dismissedDrafts.has(csKey)) {
          const box = document.createElement('div');
          box.className = 'generated-box';
          const openerLabel = document.createElement('div');
          openerLabel.className = 'generated-subject';
          openerLabel.textContent = 'Opener';
          const openerBody = document.createElement('div');
          openerBody.className = 'generated-body';
          openerBody.textContent = latest.opener;
          box.append(openerLabel, openerBody);
          (latest.questions || []).forEach((group) => {
            const catLabel = document.createElement('div');
            catLabel.className = 'generated-subject';
            catLabel.style.marginTop = '10px';
            catLabel.textContent = group.category;
            const catBody = document.createElement('div');
            catBody.className = 'generated-body';
            catBody.textContent = (group.items || []).map((q) => '• ' + q).join('\n');
            box.append(catLabel, catBody);
          });
          const closeLabel = document.createElement('div');
          closeLabel.className = 'generated-subject';
          closeLabel.style.marginTop = '10px';
          closeLabel.textContent = 'Meeting Close';
          const closeBody = document.createElement('div');
          closeBody.className = 'generated-body';
          closeBody.textContent = latest.close;
          box.append(closeLabel, closeBody);
          const foot = document.createElement('div');
          foot.className = 'generated-foot';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'mini-btn';
          copyBtn.type = 'button';
          copyBtn.textContent = '📋 Copy Script';
          copyBtn.addEventListener('click', () => copyText(formatCallScript(latest), copyBtn));
          const variantBtn = document.createElement('button');
          variantBtn.className = 'mini-btn';
          variantBtn.type = 'button';
          variantBtn.textContent = '🔀 Different Version';
          variantBtn.addEventListener('click', () => generateContactCallScript(id, contact.id, variantBtn, true));
          const dismissBtn = document.createElement('button');
          dismissBtn.className = 'mini-btn';
          dismissBtn.type = 'button';
          dismissBtn.textContent = '✕ Close';
          dismissBtn.addEventListener('click', () => {
            dismissedDrafts.add(csKey);
            renderModal(id);
          });
          foot.append(copyBtn, variantBtn, dismissBtn);
          box.appendChild(foot);
          genWrap.appendChild(box);
        }
        if (callScripts.length > 1) {
          genWrap.appendChild(buildHistoryToggle(callScripts.slice(0, -1).reverse(), formatCallScript));
        }
      }
      card.appendChild(genWrap);

      // Call notes — a bigger, one-click place to jot notes while on a call.
      const callToggle = document.createElement('button');
      callToggle.className = 'mini-btn';
      callToggle.type = 'button';
      const isOpen = openCallPanels.has(contact.id);
      callToggle.textContent = isOpen ? '📞 Hide call notes' : '📞 Log Call';
      callToggle.style.marginTop = '10px';
      callToggle.addEventListener('click', () => {
        if (openCallPanels.has(contact.id)) openCallPanels.delete(contact.id);
        else openCallPanels.add(contact.id);
        renderModal(id);
      });
      card.appendChild(callToggle);

      if (isOpen) {
        const panel = document.createElement('div');
        panel.className = 'call-panel';
        const callArea = document.createElement('textarea');
        callArea.className = 'call-notes-textarea';
        callArea.placeholder = 'Notes while calling ' + contact.name.split(' ')[0] + '…';
        const saveCallBtn = document.createElement('button');
        saveCallBtn.className = 'gm-add';
        saveCallBtn.type = 'button';
        saveCallBtn.textContent = 'Save Call Note';
        saveCallBtn.addEventListener('click', () => {
          if (!callArea.value.trim()) return;
          logCallNote(id, contact.id, callArea.value);
          openCallPanels.delete(contact.id);
        });
        panel.append(callArea, saveCallBtn);
        card.appendChild(panel);
      }

      const actLabel = document.createElement('div');
      actLabel.className = 'mini-label';
      actLabel.style.marginTop = '12px';
      actLabel.textContent = 'Activity';
      card.appendChild(actLabel);

      const tpList = document.createElement('div');
      tpList.className = 'touchpoint-list';
      const touchpoints = contact.touchpoints || [];
      if (touchpoints.length === 0) {
        const none = document.createElement('div');
        none.className = 'contacts-empty';
        none.style.margin = '0';
        none.textContent = 'No touchpoints logged yet.';
        tpList.appendChild(none);
      } else {
        touchpoints.forEach((tp) => {
          const row = document.createElement('div');
          row.className = 'touchpoint-row';
          const date = document.createElement('span');
          date.className = 'touchpoint-date';
          date.textContent = tp.date;
          const type = document.createElement('span');
          type.className = 'touchpoint-type';
          type.textContent = tp.type;
          const note = document.createElement('span');
          note.className = 'touchpoint-note';
          note.textContent = tp.note || '';
          const del2 = document.createElement('button');
          del2.className = 'touchpoint-del';
          del2.type = 'button';
          del2.textContent = '×';
          del2.addEventListener('click', () => deleteTouchpoint(id, contact.id, tp.id));
          row.append(date, type, note, del2);
          tpList.appendChild(row);
        });
      }
      card.appendChild(tpList);

      const addRow = document.createElement('div');
      addRow.className = 'touchpoint-add-row';
      const dateInput = document.createElement('input');
      dateInput.type = 'date';
      dateInput.value = new Date().toISOString().slice(0, 10);
      const typeSelect = document.createElement('select');
      TOUCHPOINT_TYPES.forEach((t) => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        typeSelect.appendChild(opt);
      });
      const noteInput = document.createElement('input');
      noteInput.type = 'text';
      noteInput.placeholder = 'Note (optional)…';
      const addBtn = document.createElement('button');
      addBtn.className = 'mini-btn';
      addBtn.type = 'button';
      addBtn.textContent = '+ Log';
      addBtn.addEventListener('click', () => {
        addTouchpoint(id, contact.id, dateInput.value || new Date().toISOString().slice(0, 10), typeSelect.value, noteInput.value);
      });
      noteInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBtn.click(); });
      addRow.append(dateInput, typeSelect, noteInput, addBtn);
      card.appendChild(addRow);

      sec.appendChild(card);
    });

    const addContactRow = document.createElement('div');
    addContactRow.className = 'contact-add-row';
    const nameInput = document.createElement('input');
    nameInput.className = 'gm-input';
    nameInput.type = 'text';
    nameInput.placeholder = 'Contact name…';
    const titleInput = document.createElement('input');
    titleInput.className = 'gm-input';
    titleInput.type = 'text';
    titleInput.placeholder = 'Job title (required, e.g. VP of Safety)…';
    titleInput.required = true;
    const emailInput = document.createElement('input');
    emailInput.className = 'gm-input';
    emailInput.type = 'text';
    emailInput.placeholder = 'Email (optional)…';
    const linkedinInput = document.createElement('input');
    linkedinInput.className = 'gm-input';
    linkedinInput.type = 'text';
    linkedinInput.placeholder = 'LinkedIn URL (optional)…';
    const addContactBtn = document.createElement('button');
    addContactBtn.className = 'gm-add';
    addContactBtn.type = 'button';
    addContactBtn.textContent = '+ Add Contact';
    addContactBtn.addEventListener('click', () => {
      addContact(id, nameInput.value, titleInput.value, emailInput.value, linkedinInput.value);
    });
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addContactBtn.click(); });
    addContactRow.append(nameInput, titleInput, emailInput, linkedinInput, addContactBtn);
    sec.appendChild(addContactRow);

    return sec;
  }

  function buildHistoryToggle(items, textFn) {
    const wrap = document.createElement('div');
    const toggle = document.createElement('div');
    toggle.className = 'history-toggle';
    toggle.textContent = 'Show ' + items.length + ' earlier version' + (items.length === 1 ? '' : 's');
    const list = document.createElement('div');
    list.className = 'history-list';
    items.forEach((it) => {
      const row = document.createElement('div');
      row.className = 'history-item';
      row.textContent = fmtDate(it.generatedAt);
      const body = document.createElement('div');
      body.className = 'history-item-body';
      body.textContent = textFn(it);
      row.appendChild(body);
      list.appendChild(row);
    });
    toggle.addEventListener('click', () => {
      const showing = list.classList.toggle('show');
      toggle.textContent = showing ? 'Hide earlier versions' : 'Show ' + items.length + ' earlier version' + (items.length === 1 ? '' : 's');
    });
    wrap.append(toggle, list);
    return wrap;
  }

  /* ---------- boot ---------- */
  renderLists();

  // Wait for DOMContentLoaded — sync.js loads with `defer`, so it hasn't run
  // yet at the point this inline script executes; without this wait
  // `window.initCloudSync` would still be undefined and sync would silently
  // never turn on (this was the bug: companies never left the device that
  // added them). Same fix already applied in pt.html / evotix.html.
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'outreach',
      syncedKeys: [STORE_KEY, FRAMEWORK_EMAIL_KEY, FRAMEWORK_LINKEDIN_KEY],
      onApplied: function () {
        renderLists();
        if (openId) renderModal(openId);
      }
    });
    // Must mirror evotix.html's own 'evotix' sync config exactly — both pages
    // write to evotix:saos, and cloud sync replaces the whole remote record
    // rather than merging, so a narrower key list here would clobber the rest.
    initCloudSync({
      appKey: 'evotix',
      syncedKeys: ['evotix:paychecks', 'evotix:saos'],
      syncedPrefixes: ['evotix:mit:']
    });
    // Must mirror main.html's 'goals' sync config exactly, same reason.
    initCloudSync({
      appKey: 'goals',
      syncedPrefixes: ['goals:', 'lifegoals_v1', 'lifegoals_period_meta_v1', 'lgdaily:', 'lgweekly:', 'lgmonthly:']
    });
  });
})();
</script>
</body>
</html>
