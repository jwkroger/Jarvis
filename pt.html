<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>PT · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --accent:  #FB7185;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }

.hub-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
.dash-title {
  margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--text-tertiary);
  text-decoration: none; transition: color 0.15s;
}
.back-link:hover { color: var(--text-primary); }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
}
.gm-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 82% 10%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 55%);
  opacity: 0.8;
}

.gm-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; position: relative; }
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.045em; color: var(--text-primary); line-height: 1; }
.gm-progress-label { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-left: 4px; }

.gm-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
  color: var(--accent);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em;
}

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; position: relative; }
.stat { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
.stat-num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; color: var(--text-primary); line-height: 1; }
.stat-label { margin-top: 6px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }

.income-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  transition: background 0.2s;
}
.income-row:hover { background: rgba(255,255,255,0.06); }
.income-date { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-tertiary); flex-shrink: 0; width: 56px; }
.income-note { flex: 1; min-width: 0; font-size: 14px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.income-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--success); flex-shrink: 0; }
.income-status-pill {
  flex-shrink: 0; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-tertiary);
  font-family: inherit; font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 999px; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.income-status-pill.paid { background: rgba(107,227,164,0.12); border-color: rgba(107,227,164,0.32); color: var(--success); }
.income-status-pill.pending { background: rgba(242,192,99,0.12); border-color: rgba(242,192,99,0.32); color: var(--warning); }
.income-delete {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 18px; cursor: pointer; padding: 0 2px; flex-shrink: 0;
  opacity: 0.5; transition: opacity 0.2s, color 0.2s;
}
.income-row:hover .income-delete { opacity: 1; }
.income-delete:hover { color: var(--danger); }

.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.gm-input {
  flex: 1; min-width: 100px;
  padding: 11px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; background: rgba(0,0,0,0.28);
  color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.gm-input.date-input { flex: 0 0 140px; color-scheme: dark; }
.gm-input.amount-input { flex: 0 0 110px; }

.gm-checkbox-wrap {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 14px; border-radius: 12px;
  background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.08);
  font-size: 13px; color: var(--text-secondary); cursor: pointer; user-select: none;
}
.gm-checkbox-wrap input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

/* ===== Content pipeline (kanban) ===== */
.content-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.content-toolbar .gm-input { min-width: 140px; }
.content-status { font-size: 11.5px; color: var(--text-tertiary); min-height: 16px; margin: 6px 2px 14px; }

.content-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
@media (max-width: 900px) { .content-board { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .content-board { grid-template-columns: 1fr; } }

.content-col { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.content-col-head { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
.content-col-title { font-size: 10.5px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); }
.content-col-count {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary);
  background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 999px;
}

.content-card {
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.content-pillar {
  display: inline-flex; align-self: flex-start;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  padding: 3px 8px; border-radius: 999px;
}
.content-idea-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.4; }
.content-script {
  width: 100%; min-height: 90px; resize: vertical;
  padding: 9px 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 12.5px; line-height: 1.5; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.content-script::placeholder { color: var(--text-tertiary); }
.content-script:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }

.content-checklist { display: flex; flex-direction: column; gap: 6px; }
.content-check-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; user-select: none; }
.content-check-row input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
.content-check-row.is-done { color: var(--text-tertiary); text-decoration: line-through; }

.content-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.content-btn {
  flex: 1; padding: 8px 10px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-primary);
  font-family: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer;
  transition: background 0.15s; white-space: nowrap;
}
.content-btn:hover { background: rgba(255,255,255,0.08); }
.content-btn.primary {
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B; border-color: transparent;
}
.content-btn.primary:hover { filter: brightness(1.05); }
.content-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.content-btn:disabled:hover { background: rgba(255,255,255,0.04); filter: none; }

.content-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.content-icon-btn {
  border: 0; background: transparent; color: var(--text-tertiary);
  cursor: pointer; font-size: 15px; padding: 2px 4px; opacity: 0.6; flex-shrink: 0;
  transition: opacity 0.15s, color 0.15s;
}
.content-icon-btn:hover { opacity: 1; color: var(--danger); }
.content-posted-meta { font-size: 11px; color: var(--text-tertiary); }

.content-empty-col {
  font-size: 11.5px; color: var(--text-tertiary); font-style: italic; text-align: center;
  padding: 18px 8px; border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;
}

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .gm-progress-num { font-size: 34px; }
  .income-note { white-space: normal; }
  .gm-input.date-input, .gm-input.amount-input { flex: 1 1 100px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="hub-head">
    <div>
      <a class="back-link" href="index.html">← Jarvis</a>
      <h1 class="dash-title" style="margin-top:4px">PT</h1>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Content Pipeline</div>
    <div class="gm-card">
      <div class="content-toolbar">
        <select class="gm-input" id="cPillar" style="flex:0 0 170px">
          <option>Transformation</option>
          <option>BFT Highlight</option>
          <option>Online Coaching</option>
          <option>Education / Tips</option>
          <option>Behind the Scenes</option>
          <option>Personal Brand</option>
          <option>Other</option>
        </select>
        <input class="gm-input" id="cIdeaText" type="text" placeholder="New idea / hook…" autocomplete="off">
        <button class="gm-add" id="cIdeaAdd" type="button">+ Idea</button>
        <button class="content-btn primary" id="cSuggestBtn" type="button" style="flex:0 0 auto; padding:11px 16px;">✨ Suggest 5 Ideas</button>
      </div>
      <div class="content-status" id="cStatus"></div>

      <div class="content-board">
        <div class="content-col">
          <div class="content-col-head">
            <span class="content-col-title">Idea</span>
            <span class="content-col-count" id="colIdeaCount">0</span>
          </div>
          <div id="colIdea"></div>
        </div>
        <div class="content-col">
          <div class="content-col-head">
            <span class="content-col-title">Scripted</span>
            <span class="content-col-count" id="colScriptedCount">0</span>
          </div>
          <div id="colScripted"></div>
        </div>
        <div class="content-col">
          <div class="content-col-head">
            <span class="content-col-title">Filmed</span>
            <span class="content-col-count" id="colFilmedCount">0</span>
          </div>
          <div id="colFilmed"></div>
        </div>
        <div class="content-col">
          <div class="content-col-head">
            <span class="content-col-title">Posted</span>
            <span class="content-col-count" id="colPostedCount">0</span>
          </div>
          <div id="colPosted"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Overview</div>
    <div class="gm-card">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow">This Month</div>
          <div class="gm-progress-row">
            <span class="gm-progress-num" id="ptMonthNum">$0</span>
            <span class="gm-progress-label" id="ptMonthLabel">earned</span>
          </div>
        </div>
        <span class="gm-streak" id="ptUnpaidPill">$0 unpaid</span>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="ptWeekNum">$0</div><div class="stat-label">This Week</div></div>
        <div class="stat"><div class="stat-num" id="ptYearNum">$0</div><div class="stat-label">This Year</div></div>
        <div class="stat"><div class="stat-num" id="ptSessionsNum">0</div><div class="stat-label">Sessions Logged</div></div>
        <div class="stat"><div class="stat-num" id="ptAvgNum">$0</div><div class="stat-label">Avg / Session</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sessions</div>
    <div class="gm-card">
      <ul class="goal-list" id="ptList"></ul>

      <div class="gm-input-wrap">
        <input class="gm-input date-input" id="ptDate" type="date">
        <input class="gm-input" id="ptClient" type="text" placeholder="Client / note…" autocomplete="off">
        <input class="gm-input amount-input" id="ptAmount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Amount">
        <label class="gm-checkbox-wrap">
          <input type="checkbox" id="ptPaid" checked>
          Paid
        </label>
        <button class="gm-add" id="ptAdd" type="button">Add</button>
      </div>
    </div>
  </div>

</div><!-- /.page -->

<script>
(function () {
  'use strict';

  const STORE_KEY = 'pt:sessions';
  const $ = (id) => document.getElementById(id);

  const listEl   = $('ptList');
  const dateEl   = $('ptDate');
  const clientEl = $('ptClient');
  const amountEl = $('ptAmount');
  const paidEl   = $('ptPaid');
  const addEl    = $('ptAdd');

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch (e) { return []; }
  }
  function save(items) { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function mondayStr() {
    const d = new Date();
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    const m = new Date(d);
    m.setDate(d.getDate() + diff);
    return m.getFullYear() + '-' + String(m.getMonth()+1).padStart(2,'0') + '-' + String(m.getDate()).padStart(2,'0');
  }
  function fmtMoney(n) {
    const v = Math.round((n + Number.EPSILON) * 100) / 100;
    return '$' + v.toLocaleString(undefined, { minimumFractionDigits: v % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 });
  }
  function fmtDateShort(s) {
    const [y, m, d] = s.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function renderStats() {
    const items = load();
    const today = todayStr();
    const week = mondayStr();
    const month = today.slice(0, 7);
    const year = today.slice(0, 4);

    let weekSum = 0, monthSum = 0, yearSum = 0, unpaidSum = 0, count = 0;
    items.forEach((it) => {
      const amt = Number(it.amount) || 0;
      count++;
      if (it.date >= week && it.date <= today) weekSum += amt;
      if (it.date.slice(0,7) === month) monthSum += amt;
      if (it.date.slice(0,4) === year) yearSum += amt;
      if (!it.paid) unpaidSum += amt;
    });

    $('ptMonthNum').textContent = fmtMoney(monthSum);
    $('ptWeekNum').textContent = fmtMoney(weekSum);
    $('ptYearNum').textContent = fmtMoney(yearSum);
    $('ptSessionsNum').textContent = String(count);
    $('ptAvgNum').textContent = fmtMoney(count ? (yearSum || monthSum || weekSum) / Math.max(1, count) : 0);
    const unpaidPill = $('ptUnpaidPill');
    unpaidPill.textContent = fmtMoney(unpaidSum) + ' unpaid';
    unpaidPill.style.opacity = unpaidSum > 0 ? '1' : '0.55';
  }

  function render() {
    const items = load();
    listEl.innerHTML = '';

    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.textContent = 'No sessions logged yet — add your first one below.';
      listEl.appendChild(li);
      renderStats();
      return;
    }

    const sorted = items.map((it, i) => ({ it, i })).sort((a, b) => b.it.date.localeCompare(a.it.date));

    sorted.forEach(({ it, i }) => {
      const li = document.createElement('li');
      li.className = 'income-row';

      const date = document.createElement('span');
      date.className = 'income-date';
      date.textContent = fmtDateShort(it.date);

      const note = document.createElement('span');
      note.className = 'income-note';
      note.textContent = it.client || 'Session';

      const pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'income-status-pill ' + (it.paid ? 'paid' : 'pending');
      pill.textContent = it.paid ? 'Paid' : 'Pending';
      pill.addEventListener('click', () => {
        const list = load(); list[i].paid = !list[i].paid; save(list); render();
      });

      const amount = document.createElement('span');
      amount.className = 'income-amount';
      amount.textContent = fmtMoney(Number(it.amount) || 0);

      const del = document.createElement('button');
      del.className = 'income-delete';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', () => {
        const list = load(); list.splice(i, 1); save(list); render();
      });

      li.append(date, note, pill, amount, del);
      listEl.appendChild(li);
    });

    renderStats();
  }

  function add() {
    const date = dateEl.value || todayStr();
    const client = clientEl.value.trim();
    const amount = parseFloat(amountEl.value);
    if (!amount || amount <= 0) return;
    const items = load();
    items.push({ date: date, client: client, amount: amount, paid: !!paidEl.checked });
    save(items);
    clientEl.value = '';
    amountEl.value = '';
    clientEl.focus();
    render();
  }
  addEl.addEventListener('click', add);
  [clientEl, amountEl].forEach((el) => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') add(); }));

  dateEl.value = todayStr();
  render();
  window.__sessionsReload = render;

  if (window.initCloudSync) {
    window.initCloudSync({
      appKey: 'pt',
      syncedKeys: [STORE_KEY, 'pt:content'],
      onApplied: function () {
        render();
        if (window.__contentReload) window.__contentReload();
      }
    });
  }
})();
</script>

<script>
(function () {
  'use strict';

  const STORE_KEY = 'pt:content';
  const PILLARS = ['Transformation', 'BFT Highlight', 'Online Coaching', 'Education / Tips', 'Behind the Scenes', 'Personal Brand', 'Other'];
  const STAGES = ['idea', 'scripted', 'filmed', 'posted'];

  // Paste an Anthropic API key here to enable AI idea suggestions + script drafts.
  // Without one, the buttons fall back to a clear inline message — everything
  // else (manual ideas, scripts, checklist, board) still works.
  const ANTHROPIC_API_KEY = '';

  const $ = (id) => document.getElementById(id);
  const statusEl = $('cStatus');

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch (e) { return []; }
  }
  function save(items) { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }
  function newId() { return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function findById(items, id) { return items.findIndex((c) => c.id === id); }
  function updateCard(id, mutator) {
    const items = load();
    const i = findById(items, id);
    if (i < 0) return;
    mutator(items[i]);
    save(items);
    render();
  }
  function deleteCard(id) {
    const items = load();
    const i = findById(items, id);
    if (i < 0) return;
    items.splice(i, 1);
    save(items);
    render();
  }

  function setStatus(msg, ttl) {
    statusEl.textContent = msg;
    if (ttl) setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, ttl);
  }

  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  /* ---------- Claude API (browser-direct, same pattern as the goal Polish button) ---------- */
  async function callClaude(prompt, maxTokens) {
    if (!ANTHROPIC_API_KEY) {
      const err = new Error('no-key');
      err.noKey = true;
      throw err;
    }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data && data.content && data.content[0] && data.content[0].text;
    if (!text) throw new Error('empty response');
    return text;
  }

  async function suggestIdeas() {
    const items = load();
    const existing = items.filter((c) => c.stage === 'idea').map((c) => c.idea).slice(-15);
    const prompt = 'You are a social media strategist helping a personal trainer grow an Instagram presence. ' +
      'They currently run in-person group training at BFT and are starting to build an online coaching offer, ' +
      'so mix awareness content (group training energy, client wins, education) with online-coaching-pitch ideas. ' +
      'Generate 5 short-form video content ideas (one-line hooks only, no scripts) spread across these content pillars: ' +
      PILLARS.slice(0, 6).join(', ') + '. ' +
      'Avoid repeating these existing ideas: ' + (existing.join(' | ') || 'none yet') + '. ' +
      'Return ONLY a JSON array of 5 objects like {"pillar":"...","idea":"..."} using pillar values exactly from the list above. No preamble, no markdown fences.';

    setStatus('Thinking…');
    $('cSuggestBtn').disabled = true;
    try {
      const text = await callClaude(prompt, 800);
      const cleaned = text.trim().replace(/^```(json)?/i, '').replace(/```$/, '').trim();
      const ideas = JSON.parse(cleaned);
      const list = load();
      ideas.forEach((x) => {
        list.push({
          id: newId(),
          pillar: PILLARS.includes(x.pillar) ? x.pillar : 'Other',
          idea: String(x.idea || '').trim(),
          script: '',
          stage: 'idea',
          checklist: { edit: false, caption: false, post: false, story: false },
          createdAt: Date.now()
        });
      });
      save(list);
      setStatus('');
      render();
    } catch (e) {
      setStatus(e && e.noKey
        ? 'Add an Anthropic API key in the code (search ANTHROPIC_API_KEY in pt.html) to enable AI suggestions.'
        : 'Couldn\'t generate ideas — try again.', 5000);
    } finally {
      $('cSuggestBtn').disabled = false;
    }
  }

  async function writeScript(card, textareaEl, btnEl) {
    const prompt = 'Write a short-form Instagram Reel script and caption for a personal trainer\'s content idea.\n' +
      'Idea: "' + card.idea + '"\n' +
      'Content pillar: ' + card.pillar + '\n' +
      'Keep the reel 30-45 seconds. Format exactly as plain text:\n' +
      'HOOK: ...\nBEATS:\n- ...\n- ...\nCTA: ...\nCAPTION: ...\nHASHTAGS: ...\n' +
      'No markdown, no extra commentary.';

    const origLabel = btnEl.textContent;
    btnEl.disabled = true;
    btnEl.textContent = 'Writing…';
    try {
      const text = await callClaude(prompt, 700);
      textareaEl.value = text.trim();
      updateCard(card.id, (c) => { c.script = text.trim(); });
    } catch (e) {
      setStatus(e && e.noKey
        ? 'Add an Anthropic API key in the code (search ANTHROPIC_API_KEY in pt.html) to enable AI scripts.'
        : 'Couldn\'t write a script — try again.', 5000);
      btnEl.disabled = false;
      btnEl.textContent = origLabel;
    }
  }

  /* ---------- card builders ---------- */
  function pillarChip(pillar) {
    const chip = document.createElement('span');
    chip.className = 'content-pillar';
    chip.textContent = pillar;
    return chip;
  }

  function buildIdeaCard(card) {
    const el = document.createElement('div');
    el.className = 'content-card';

    const idea = document.createElement('div');
    idea.className = 'content-idea-text';
    idea.textContent = card.idea;

    const script = document.createElement('textarea');
    script.className = 'content-script';
    script.placeholder = 'Script draft (write your own, or use AI Script)…';
    script.value = card.script || '';
    script.addEventListener('blur', () => updateCard(card.id, (c) => { c.script = script.value; }));

    const actions = document.createElement('div');
    actions.className = 'content-card-actions';

    const aiBtn = document.createElement('button');
    aiBtn.className = 'content-btn';
    aiBtn.type = 'button';
    aiBtn.textContent = '✨ AI Script';
    aiBtn.addEventListener('click', () => writeScript(card, script, aiBtn));

    const moveBtn = document.createElement('button');
    moveBtn.className = 'content-btn primary';
    moveBtn.type = 'button';
    moveBtn.textContent = 'Move to Scripted →';
    moveBtn.disabled = !(card.script && card.script.trim());
    script.addEventListener('input', () => { moveBtn.disabled = !script.value.trim(); });
    moveBtn.addEventListener('click', () => updateCard(card.id, (c) => { c.script = script.value; c.stage = 'scripted'; }));

    actions.append(aiBtn, moveBtn);

    const foot = document.createElement('div');
    foot.className = 'content-card-foot';
    const del = document.createElement('button');
    del.className = 'content-icon-btn';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', () => deleteCard(card.id));
    foot.append(document.createElement('span'), del);

    el.append(pillarChip(card.pillar), idea, script, actions, foot);
    return el;
  }

  function buildScriptedCard(card) {
    const el = document.createElement('div');
    el.className = 'content-card';

    const idea = document.createElement('div');
    idea.className = 'content-idea-text';
    idea.textContent = card.idea;

    const script = document.createElement('textarea');
    script.className = 'content-script';
    script.value = card.script || '';
    script.addEventListener('blur', () => updateCard(card.id, (c) => { c.script = script.value; }));

    const actions = document.createElement('div');
    actions.className = 'content-card-actions';
    const back = document.createElement('button');
    back.className = 'content-btn';
    back.type = 'button';
    back.textContent = '‹ Back';
    back.addEventListener('click', () => updateCard(card.id, (c) => { c.script = script.value; c.stage = 'idea'; }));
    const fwd = document.createElement('button');
    fwd.className = 'content-btn primary';
    fwd.type = 'button';
    fwd.textContent = 'Move to Filmed →';
    fwd.addEventListener('click', () => updateCard(card.id, (c) => { c.script = script.value; c.stage = 'filmed'; }));
    actions.append(back, fwd);

    const foot = document.createElement('div');
    foot.className = 'content-card-foot';
    const del = document.createElement('button');
    del.className = 'content-icon-btn';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', () => deleteCard(card.id));
    foot.append(document.createElement('span'), del);

    el.append(pillarChip(card.pillar), idea, script, actions, foot);
    return el;
  }

  function buildFilmedCard(card) {
    const el = document.createElement('div');
    el.className = 'content-card';

    const idea = document.createElement('div');
    idea.className = 'content-idea-text';
    idea.textContent = card.idea;

    const checklist = document.createElement('div');
    checklist.className = 'content-checklist';
    const items = [['edit', 'Edit'], ['caption', 'Caption'], ['post', 'Post'], ['story', 'Repost to Story']];
    const cb = {};
    items.forEach(([key, label]) => {
      const row = document.createElement('label');
      row.className = 'content-check-row' + (card.checklist[key] ? ' is-done' : '');
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = !!card.checklist[key];
      cb[key] = input;
      input.addEventListener('change', () => {
        row.classList.toggle('is-done', input.checked);
        updateReadyState();
        updateCard(card.id, (c) => { c.checklist[key] = input.checked; });
      });
      const span = document.createElement('span');
      span.textContent = label;
      row.append(input, span);
      checklist.appendChild(row);
    });

    const actions = document.createElement('div');
    actions.className = 'content-card-actions';
    const back = document.createElement('button');
    back.className = 'content-btn';
    back.type = 'button';
    back.textContent = '‹ Back';
    back.addEventListener('click', () => updateCard(card.id, (c) => { c.stage = 'scripted'; }));
    const fwd = document.createElement('button');
    fwd.className = 'content-btn primary';
    fwd.type = 'button';
    fwd.textContent = 'Mark Posted →';
    function updateReadyState() {
      fwd.disabled = !(cb.edit.checked && cb.caption.checked && cb.post.checked);
    }
    updateReadyState();
    fwd.addEventListener('click', () => updateCard(card.id, (c) => { c.stage = 'posted'; c.postedAt = Date.now(); }));
    actions.append(back, fwd);

    const foot = document.createElement('div');
    foot.className = 'content-card-foot';
    const del = document.createElement('button');
    del.className = 'content-icon-btn';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', () => deleteCard(card.id));
    foot.append(document.createElement('span'), del);

    el.append(pillarChip(card.pillar), idea, checklist, actions, foot);
    return el;
  }

  function buildPostedCard(card) {
    const el = document.createElement('div');
    el.className = 'content-card';

    const idea = document.createElement('div');
    idea.className = 'content-idea-text';
    idea.textContent = card.idea;

    const foot = document.createElement('div');
    foot.className = 'content-card-foot';
    const meta = document.createElement('span');
    meta.className = 'content-posted-meta';
    meta.textContent = 'Posted ' + (card.postedAt ? fmtDate(card.postedAt) : '');

    const btnWrap = document.createElement('div');
    btnWrap.style.display = 'flex';
    btnWrap.style.gap = '6px';
    const reopen = document.createElement('button');
    reopen.className = 'content-icon-btn';
    reopen.type = 'button';
    reopen.title = 'Reopen';
    reopen.textContent = '↺';
    reopen.addEventListener('click', () => updateCard(card.id, (c) => { c.stage = 'filmed'; }));
    const del = document.createElement('button');
    del.className = 'content-icon-btn';
    del.type = 'button';
    del.textContent = '×';
    del.addEventListener('click', () => deleteCard(card.id));
    btnWrap.append(reopen, del);

    foot.append(meta, btnWrap);
    el.append(pillarChip(card.pillar), idea, foot);
    return el;
  }

  const BUILDERS = { idea: buildIdeaCard, scripted: buildScriptedCard, filmed: buildFilmedCard, posted: buildPostedCard };

  function render() {
    const items = load();
    STAGES.forEach((stage) => {
      const colEl = $('col' + stage.charAt(0).toUpperCase() + stage.slice(1));
      const countEl = $('col' + stage.charAt(0).toUpperCase() + stage.slice(1) + 'Count');
      const cards = items.filter((c) => c.stage === stage).sort((a, b) => a.createdAt - b.createdAt);
      countEl.textContent = String(cards.length);
      colEl.innerHTML = '';
      if (cards.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'content-empty-col';
        empty.textContent = stage === 'idea' ? 'No ideas yet' : 'Nothing here yet';
        colEl.appendChild(empty);
        return;
      }
      cards.forEach((card) => colEl.appendChild(BUILDERS[card.stage](card)));
    });
  }

  function addIdea() {
    const textEl = $('cIdeaText');
    const text = textEl.value.trim();
    if (!text) return;
    const items = load();
    items.push({
      id: newId(),
      pillar: $('cPillar').value,
      idea: text,
      script: '',
      stage: 'idea',
      checklist: { edit: false, caption: false, post: false, story: false },
      createdAt: Date.now()
    });
    save(items);
    textEl.value = '';
    render();
  }
  $('cIdeaAdd').addEventListener('click', addIdea);
  $('cIdeaText').addEventListener('keydown', (e) => { if (e.key === 'Enter') addIdea(); });
  $('cSuggestBtn').addEventListener('click', suggestIdeas);

  render();
  window.__contentReload = render;
})();
</script>
</body>
